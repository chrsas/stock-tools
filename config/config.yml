# stock-tools 配置模板（committed，无密钥）。
# 用法：复制为 config/config.local.yml 后填值；config.local.yml 已被 .gitignore，绝不入库。
# 默认值来源：probe/probe_findings.md §11（探针实测建议初值）。

platform: xueqiu

# ── 登录态（敏感）────────────────────────────────────────────────
# 从已登录雪球的浏览器 DevTools → Application → Cookies 复制。
# 绝不入库、绝不进任何导出文件（规范硬约束）。二选一：
auth:
  # 方式一：直接粘整段 cookie 串（最省事）。至少含 xq_a_token; xqat; u
  cookie: ""              # 例: "xq_a_token=xxx; xqat=xxx; u=xxx; xq_id_token=xxx"
  # 方式二：留空上面的 cookie，改从环境变量读（更安全）
  cookie_env: XUEQIU_COOKIE
  # 留空两者 = guest 模式：仅能读 feed page1、公开帖直链

# ── 追踪账号 ────────────────────────────────────────────────────
accounts:
  - uid: ""                # 数字 uid，例: 1234567890（主页 URL 里 /u/ 后那串）
    note: ""               # 备注（可选）
    watch_mode: recent_window   # recent_window | pinned

# ── 采集节奏（温和采集，见 findings §9）────────────────────────────
polling:
  feed_interval_minutes: 180          # feed 轮询：每账号 2–6h
  direct_recheck_interval_minutes: 360
  request_min_interval_seconds: 2.5   # ≥2–3s/请求
  request_jitter_seconds: 1.5
  max_feed_pages: 20                  # 单轮翻页硬上限，命中后按 partial 留痕
  bootstrap_per_run: true             # 每轮仅 1 次首页引导铸 cookie

# ── 历史回填（与实时监控分离，宪章第9条；回填版本不进事件研究）──────────
backfill:
  on_add_enabled: true   # 首次加入某账号时，自动回填一段历史作为基线
  on_add_pages: 5        # 首次加入时，在实时轮询覆盖范围之后再多回填 N 页历史；0=关闭，负值报错
  command_pages: 10      # `backfill` 命令未指定 --pages 时的默认页数

# ── 监控与状态机参数（findings §10/§11）──────────────────────────
monitoring:
  window_days: 30                     # recent_window 默认窗口
  absent_threshold_n: 3               # 缺席阈值 N，规范下限 ≥3
  recent_feed_absent_ttl_days: 7
  llm_candidate_ttl_days: 14          # 阶段 3
  min_samples: 30                     # 阶段 3

# ── 正文 fidelity（findings §8 实测）──────────────────────────────
fidelity:
  feed: full        # 普通帖 full；is_column/truncated 时运行期自动降为 preview
  direct: full

adapter:
  version: xueqiu-3   # 接口结构变更时递增（xueqiu-3：解析图片清单并纳入版本判定）

# ── 图片证据（下载/OCR/VLM；均为独立按需 pass，不进实时采集）──────────────
images:
  request_min_interval_seconds: 1.0    # 图片 CDN 较温和，间隔可小于 feed
  request_jitter_seconds: 1.0
  max_image_bytes: 8388608             # 单图上限 8MiB，超限记 download_status=failed(too_large)
  max_batch_bytes: 268435456           # 单次 download-images 累计成功字节上限 256MiB，达到即停，余量留待下轮

storage:
  db_path: data/kol.sqlite3
  backup_dir: data/backups
  backup_after_run: true               # 每轮采集完成后生成经恢复验证的快照
  backup_retention_count: 30           # 仅保留最近 N 份快照

# ── 中性变更摘要（阶段 6）────────────────────────────────────────
digest:
  output_dir: data/digests
  wave_min_accounts: 3                 # 窗口内发生确证删除事件的账号数达到此值时标注平台级密集期

# ── 主动通知与采集健康告警（阶段 6）──────────────────────────────
notifications:
  enabled: false                       # 在 config.local.yml 启用
  webhook_url_env: KOL_NOTIFICATION_WEBHOOK_URL
  private_base_url: ""                 # 启用时填写 Tailscale 私网网页地址
  timeout_seconds: 10
alerts:
  failure_streak: 2
  state_path: data/alerts/run-health.json

# ── 中性统计分析（阶段 9）────────────────────────────────────────
analysis:
  min_group_samples: 10                # 删除/保留任一组低于此门槛只显示样本不足
  crowding_min_authors: 3              # 同标的同方向滚动窗口最低独立作者数
  crowding_window_days: 7

# ── 采集通道（findings §14：雪球 WAF/滑块，httpx 直连已被封死）─────────
# 数据路径二选一：专用真实浏览器(CDP) 或 httpx 直连。
browser:
  enabled: true                        # true=run-once 走专用 Edge(CDP)；false=用 httpx 直连(已被 WAF 拦，仅留作离线/历史)
  cdp_url: http://127.0.0.1:9224       # 专用浏览器的远程调试端口
  profile_dir: data/browser_profile    # 持久化 profile（被 gitignore），首次人工过一次滑块后复用
  landing_url: https://xueqiu.com      # 连上后落地页，同源 fetch 复用其 cookie 与指纹
  edge_path: ""                        # 留空自动探测 msedge.exe；可手动指向 msedge.exe 或 chrome.exe

# ── 本地网页（阶段 2b）──────────────────────────────────────────
web:
  bind_host: 127.0.0.1                 # 手机访问时仅在 local 配置覆盖为 Tailscale 地址
  port: 8765
  timeline_limit: 50
  viewpoint_cluster_window_days: 7     # 同 ticker 相邻观点的聚簇窗口，可在本地配置扩大
  # enrich_prompt_version: enrich-v1   # 迁移期间可单独指定网页读取的旧富化版本

# ── LLM（阶段 2 单条改写训练 / 阶段 3 批量富化，按需调用）──────────────
llm:
  provider: openai_compatible
  base_url: https://api.openai.com/v1
  model: ""                    # 在 config.local.yml 中填写
  api_key_env: LLM_API_KEY     # API Key 仅从环境变量读取
  prompt_version: rewrite-v1   # 阶段 2 改写训练 prompt 版本
  enrich_prompt_version: enrich-v2   # 输出契约或判断逻辑变化必须升版本
  claim_prompt_version: claim-v1     # 可证伪命题提取契约版本
  # 图片 VLM 描述（enrich-images，推断产物，不进证据正文）：
  vision_model: ""             # 留空则复用上面的 model；建议填多模态模型 id
  vision_prompt_version: vision-v1   # 按版本隔离 image_enrichments

# ── 后续阶段占位 ──────────────────────────────────────────────────
prices:                         # 描述性市场变化，行情导入仍按需实现
  benchmark_ticker: SH000300    # 沪深 300；只与 prices 表中的共同交易日比较
